<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Compliment Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FFF0F5; --ink: #1A0810;
  --pink: #FF4D8D; --pink2: #FF85B3;
  --yellow: #FFD700; --purple: #8B2FC9;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: 'Bricolage Grotesque', sans-serif; min-height: 100vh; overflow: hidden; }

/* confetti canvas */
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

.back-nav { padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #FFD6E7; background: rgba(255,240,245,.8); backdrop-filter: blur(8px); position: relative; z-index: 10; }
.back-link { display: inline-flex; align-items: center; gap: .4rem; font-size: .85rem; font-weight: 700; color: #C0608A; text-decoration: none; transition: color .2s; }
.back-link:hover { color: var(--ink); }
.nav-title { font-size: .85rem; font-weight: 700; }

/* BG SHAPES */
.bg-shape { position: fixed; pointer-events: none; opacity: .06; }
.bg-shape-1 { width: 500px; height: 500px; background: var(--pink); border-radius: 50%; top: -100px; right: -100px; }
.bg-shape-2 { width: 400px; height: 400px; background: var(--purple); border-radius: 50%; bottom: -80px; left: -80px; }

.page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 88vh; padding: 2rem 1.5rem; gap: 2rem; text-align: center; position: relative; z-index: 1; }

.eyebrow { display: inline-block; background: #FFD6E7; border: 1px solid #FFB3CE; color: var(--pink); border-radius: 999px; padding: .3em 1.1em; font-size: .75rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }

h1 { font-size: clamp(2.5rem, 9vw, 5.5rem); font-weight: 800; letter-spacing: -.04em; line-height: .95; }
h1 em { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; color: var(--pink); }

.subtitle { font-size: 1rem; color: #7A4060; max-width: 36ch; line-height: 1.65; }

/* COMPLIMENT CARD */
.compliment-card {
  width: 100%; max-width: 540px;
  min-height: 180px;
  background: #fff;
  border: 2.5px solid var(--ink);
  border-radius: 28px;
  padding: 2.5rem 2rem;
  box-shadow: 6px 6px 0 var(--pink);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
  position: relative; overflow: hidden;
  transition: box-shadow .2s;
}

.compliment-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, #FFD6E740 0%, transparent 70%);
  pointer-events: none;
}

.compliment-card.animating { animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { 0% { transform: scale(.93); } 60% { transform: scale(1.03); } 100% { transform: scale(1); } }

.compliment-emoji { font-size: 3.5rem; line-height: 1; }
.compliment-text {
  font-size: clamp(1.1rem, 3vw, 1.45rem);
  font-weight: 700;
  line-height: 1.4;
  letter-spacing: -.02em;
  color: var(--ink);
  max-width: 28ch;
}
.compliment-text em { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; color: var(--pink); }

.compliment-sub { font-size: .82rem; color: #C080A0; font-style: italic; }

/* BUTTON */
.compliment-btn {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.1rem; font-weight: 800;
  background: var(--pink);
  color: #fff;
  border: none; border-radius: 16px;
  padding: 1rem 2.5rem;
  cursor: pointer;
  letter-spacing: -.02em;
  box-shadow: 0 4px 0 #C0206A, 0 0 40px rgba(255,77,141,.3);
  transition: transform .15s, box-shadow .15s;
}
.compliment-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #C0206A, 0 0 60px rgba(255,77,141,.4); }
.compliment-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 #C0206A; }

.count-row { font-size: .8rem; color: #C080A0; }

footer { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 1rem; font-size: .75rem; color: #C0A0B0; background: transparent; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<nav class="back-nav">
  <a href="index.html" class="back-link">&#8592; Back</a>
  <span style="color:#FFB3CE;font-size:.8rem">|</span>
  <span class="nav-title">The Compliment Machine</span>
</nav>

<div class="page">
  <div class="eyebrow">&#128150; Feels Good</div>
  <h1>The <em>Compliment</em> Machine</h1>
  <p class="subtitle">You look like you could use one. Scientifically calibrated to be sincere and slightly absurd.</p>

  <div class="compliment-card" id="compliment-card">
    <div class="compliment-emoji" id="c-emoji">&#127775;</div>
    <div class="compliment-text" id="c-text">Press the button. <em>You deserve this.</em></div>
    <div class="compliment-sub" id="c-sub"></div>
  </div>

  <button class="compliment-btn" onclick="newCompliment()">Give Me a Compliment &#10024;</button>
  <p class="count-row" id="count-row"></p>
</div>

<footer>100% genuine &middot; The Compliment Machine</footer>

<script>
(function() {
  var count = 0;

  var COMPLIMENTS = [
    { emoji: '\uD83C\uDF1F', text: 'You are the kind of person who <em>returns shopping carts</em> without being asked.', sub: 'This matters more than you know.' },
    { emoji: '\uD83E\uDD85', text: 'You have the energy of a person who has <em>definitely read the whole menu</em> before ordering.', sub: 'Thorough. Considered. Excellent.' },
    { emoji: '\uD83C\uDF08', text: 'If you were a font, you would be <em>readable without being boring.</em>', sub: 'This is the highest typographic compliment.' },
    { emoji: '\uD83E\uDDE0', text: 'You think about things in a way that is <em>quietly interesting to everyone around you.</em>', sub: 'They notice. They just don\'t always say.' },
    { emoji: '\uD83C\uDF3A', text: 'You are someone who <em>genuinely improves rooms</em> by being in them.', sub: 'The air is better. Science confirms this.' },
    { emoji: '\u2728', text: 'Somewhere, an algorithm that has never met you would still <em>classify you as a good person.</em>', sub: 'It has very high standards.' },
    { emoji: '\uD83C\uDFD4\uFE0F', text: 'You are the human equivalent of <em>finding money in an old coat.</em>', sub: 'Unexpected. Delightful. Exactly what was needed.' },
    { emoji: '\uD83D\uDC22', text: 'You have the patience of a <em>tortoise who has also read extensively about mindfulness.</em>', sub: 'Remarkably composed under pressure.' },
    { emoji: '\uD83C\uDF55', text: 'Your opinions about things are <em>consistently more interesting than people expect.</em>', sub: 'Keep sharing them.' },
    { emoji: '\uD83D\uDC2C', text: 'If you were a sea creature, you would be <em>the one other fish tell stories about.</em>', sub: 'Legendary. Mysterious. Probably bioluminescent.' },
    { emoji: '\uD83E\uDD69', text: 'You are <em>not afraid to admit when you don\'t know something,</em> which is rarer than it sounds.', sub: 'Genuinely impressive intellectual honesty.' },
    { emoji: '\uD83C\uDFB2', text: 'You are statistically unlikely, and the <em>world is better for it.</em>', sub: 'The probability of you existing is nearly zero. And yet.' },
    { emoji: '\uD83C\uDF2C\uFE0F', text: 'You are the kind of person who <em>reads the whole article</em> before forming an opinion.', sub: 'Increasingly rare. Deeply admirable.' },
    { emoji: '\uD83D\uDCD6', text: 'Your memory for things that <em>actually matter to people</em> is exceptional.', sub: 'You remember. That means more than you think.' },
    { emoji: '\uD83C\uDFC6', text: 'In the obscure personal category of <em>being exactly yourself,</em> you are in first place.', sub: 'No competition. Undefeated champion.' },
    { emoji: '\uD83E\uDEF6', text: 'You have that rare quality of <em>making other people feel more capable</em> around you.', sub: 'You elevate the room without trying.' },
    { emoji: '\uD83C\uDF3B', text: 'You are like a <em>well-indexed library</em> of good instincts.', sub: 'Organized. Helpful. Better each visit.' },
    { emoji: '\uD83D\uDC2C', text: 'The version of you that exists in <em>other people\'s stories</em> is consistently a good one.', sub: 'You are described kindly when you are not there.' },
    { emoji: '\u26A1', text: 'You are fast to <em>actually help</em> and slow to <em>judge.</em>', sub: 'The correct configuration. Very few people get this right.' },
    { emoji: '\uD83C\uDF0A', text: 'You handle uncertainty with the grace of <em>someone who has made peace with uncertainty.</em>', sub: 'This is a skill. Most people never learn it.' },
  ];

  var lastIdx = -1;

  window.newCompliment = function() {
    var idx;
    do { idx = Math.floor(Math.random() * COMPLIMENTS.length); } while (idx === lastIdx && COMPLIMENTS.length > 1);
    lastIdx = idx;
    var c = COMPLIMENTS[idx];
    count++;

    var card = document.getElementById('compliment-card');
    card.classList.remove('animating');
    card.offsetHeight;
    card.classList.add('animating');

    document.getElementById('c-emoji').textContent = c.emoji;
    document.getElementById('c-text').innerHTML = c.text;
    document.getElementById('c-sub').textContent = c.sub;
    document.getElementById('count-row').textContent = count + ' compliment' + (count === 1 ? '' : 's') + ' received';

    if (count % 3 === 0) { launchConfetti(); }
  };

  /* CONFETTI */
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', function() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

  var COLORS = ['#FF4D8D','#FFD700','#8B2FC9','#00C8A0','#FF8C42','#4ADE80'];

  function launchConfetti() {
    for (var i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -10,
        vx: (Math.random() - .5) * 4,
        vy: Math.random() * 4 + 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        size: Math.random() * 8 + 4,
        rot: Math.random() * Math.PI * 2,
        rspeed: (Math.random() - .5) * .2,
        life: 1
      });
    }
    if (!animating) { animating = true; tick(); }
  }

  var animating = false;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(function(p) { return p.life > 0; });
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += .08;
      p.rot += p.rspeed; p.life -= .012;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * .6);
      ctx.restore();
    });
    if (particles.length > 0) { requestAnimationFrame(tick); }
    else { animating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
})();
</script>
</body>
</html>
